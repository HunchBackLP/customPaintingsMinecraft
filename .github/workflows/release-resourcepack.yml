name: Build Resource Pack Release

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  build-resourcepack:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Create Resource Pack ZIP
        run: |
          cd customPaintingRessourcePack
          zip -r ../customPaintingRessourcePack.zip .

      - name: Upload ZIP to Release
        uses: softprops/action-gh-release@v2
        with:
          files: customPaintingRessourcePack.zip