name: Build Resource Pack

on:
  push:
    branches:
      - main
    paths:
      - "customPaintingRessourcePack/**"

permissions:
  contents: write

jobs:
  build-resourcepack:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Create Resource Pack ZIP
        run: |
          cd customPaintingRessourcePack
          zip -r ../customPaintingRessourcePack.zip .

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: customPaintingRessourcePack
          path: customPaintingRessourcePack.zip